apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: erp-api
  template:
    metadata:
      labels:
        app: erp-api
    spec:
      containers:
        - name: erp-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: erp-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: erp-secrets
                  key: JWT_SECRET
            - name: WRITE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: erp-secrets
                  key: WRITE_API_KEY
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
