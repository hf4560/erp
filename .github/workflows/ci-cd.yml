name: ci-cd

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: erp_test
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: |
          cd apps/backend
          npm ci
      - name: Prisma generate
        run: |
          cd apps/backend
          DATABASE_URL='postgresql://erp:erp@localhost:5432/erp_test' npm run prisma:generate
      - name: Prisma db push
        run: |
          cd apps/backend
          DATABASE_URL='postgresql://erp:erp@localhost:5432/erp_test' npm run db:push
      - name: Test
        run: |
          cd apps/backend
          NODE_ENV=test DATABASE_URL='postgresql://erp:erp@localhost:5432/erp_test' npm test
      - name: Build
        run: |
          cd apps/backend
          npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-test-build, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via Helm
        run: |
          echo "helm upgrade --install erp-api ./infra/helm/erp --namespace erp --create-namespace"
          echo "helm rollback erp-api 0 --namespace erp || true"
